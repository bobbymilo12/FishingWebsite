# Cloudflare Worker config for the ADMIRALTY tide proxy.
# Deploy with:  npx wrangler deploy
name = "fishing-tides"
main = "cloudflare-worker.js"
compatibility_date = "2026-06-05"

# Optional: lock the proxy to your site instead of allowing any origin ("*").
# [vars]
# ALLOW_ORIGIN = "https://your-username.github.io"

# DO NOT put the ADMIRALTY key here — it is a SECRET, not a plain var.
# Set it once (you'll be prompted to paste the key):
#   npx wrangler secret put ADMIRALTY_API_KEY
